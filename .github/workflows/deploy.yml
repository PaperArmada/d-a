name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages after tests pass.
# Only runs on main: the github-pages environment is restricted to the default
# branch, so deploys from any other branch would fail at the environment gate.
# (CI — .github/workflows/ci.yml — still runs the tests on branches and PRs.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel a run in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium
      - run: npm test

  deploy:
    name: Build & deploy
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r index.html manifest.webmanifest sw.js icon.svg styles core visualizations _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
